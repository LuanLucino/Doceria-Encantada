<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Doceria Encantada</title>
  <link rel="stylesheet" href="css/style-login.css">
  <link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon">
</head>
<body>
  <header>
    <h1>🍩 Doceria Encantada 🍰</h1>
    <nav>
      <ul>
        <li><a href="index.html">Início</a></li>
        <li><a href="cardapio.html">Cardápio</a></li>
        <li><a href="contato.html">Contato</a></li>
        <li><a href="carrinho.html">Carrinho 🛒</a></li>
        <li><a href="login.html">Login 🔑</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="login-container">
      <h2>Área de Login</h2>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email:</label>
          <input type="email" id="email" required>
        </div>

        <div class="form-group">
          <label for="senha">Senha:</label>
          <input type="password" id="senha" required minlength="6">
        </div>

        <button type="submit" class="btn-fofo">Login com Email</button>
        <a href="signup.html" class="btn-fofo">Cadastrar</a>
      </form>

      <p>Ou entre com:</p>
      <button id="btnGoogle" class="btn-fofo">Login com Google</button>
    </section>
  </main>

  <footer>
    <p>© 2026 Doceria Encantada - Feito com amor 💕</p>
    <p>Desenvolvido por <a href="https://luanlucino.github.io/Portfolio/" target="_blank">Luan Lucino</a></p>
  </footer>

  <script type="module" src="js/login.js"></script>
</body>
</html>
