<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Conta — Doceria Encantada</title>
  <link rel="shortcut icon" href="../assets/img/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/login.css">
</head>
<body>

  <header>
    <h1>Doceria Encantada</h1>
    <button class="nav-toggle" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <nav>
      <ul>
        <li><a href="../index.html">Início</a></li>
        <li><a href="cardapio.html">Cardápio</a></li>
        <li><a href="contato.html">Contato</a></li>
        <li><a href="carrinho.html">Carrinho</a></li>
        <li><a href="login.html">Login</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <div class="login-container">
      <h2>Criar Conta</h2>
      <div class="divider"></div>

      <form id="signupForm">
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" placeholder="seu@email.com" required>
        </div>
        <div class="form-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" placeholder="Mínimo 6 caracteres" required minlength="6">
        </div>
        <button type="submit" class="btn-fofo">Criar conta</button>
      </form>

      <p class="login-footer-link">Já tem conta? <a href="login.html">Entrar</a></p>
    </div>
  </main>

  <footer>
    <p>© 2026 Doceria Encantada — Feito com carinho</p>
    <p>Desenvolvido por <a href="https://luanlucino.github.io/Portfolio/" target="_blank">Luan Lucino</a></p>
  </footer>

  <script type="module" src="../assets/js/signup.js"></script>
</body>
</html>
